name: Tests

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - "*"

jobs:
  run_tests:
    name: Test ${{ matrix.os }} Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/checkout@v2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-timeout numpy scipy setuptools wheel cython 'setuptools_scm>=8'

      - name: Compile
        run: python setup.py develop

      - name: Test with pytest
        # Run the whole suite (not just automated_test.py) so the threading,
        # concurrency, feature-transform and ND correctness tests gate PRs.
        # --timeout is a per-test backstop: a deadlocked parallel call (e.g. a
        # lost wakeup in the idle path) fails as a timeout instead of hanging CI.
        run: python -m pytest -v tests/ --timeout=300